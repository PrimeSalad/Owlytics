# Render Blueprint — backend API (Express + Socket.IO).
# Render auto-detects this file. Secrets are marked `sync: false`, so set their
# real values in the Render dashboard (they are NOT read from this file).
services:
  - type: web
    name: owlytics-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # MongoDB connection string (e.g. from MongoDB Atlas).
      - key: MONGODB_URI
        sync: false
      # The Vercel URL(s) allowed by CORS. Comma-separate to allow several
      # (e.g. production + preview). Example: https://owlytics.vercel.app
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: QR_ENCRYPTION_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
